name: Build Native Core Binaries

on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
  pull_request:
  workflow_dispatch:

env:
  APP_NAME: katorymnd_pawapay_core

jobs:
  build:
    name: Build - ${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # --- Windows ---
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            folder: win_x86_64

          # --- macOS ---
          - os: macos-latest
            target: x86_64-apple-darwin
            folder: darwin_x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            folder: darwin_arm64

          # --- Linux (glibc) ---
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            folder: linux_x86_64_gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            folder: linux_arm64_gnu

          # --- Linux (musl / Alpine) ---
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            folder: linux_x86_64_musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            folder: linux_arm64_musl

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.platform.target }}

      # Build using maturin-action with zig support
      - name: Build Native Module
        uses: PyO3/maturin-action@v1
        with:
          working-directory: core-rust
          command: build
          args: --release --out dist --interpreter python3.12 --strip
          target: ${{ matrix.platform.target }}
          # Use zig for Linux cross-compilation (this is a maturin-action feature, not a maturin CLI flag)
          zig: ${{ contains(matrix.platform.target, 'linux') }}
          # For Linux targets, we want manylinux compatibility
          manylinux: ${{ contains(matrix.platform.target, 'linux') && 'auto' || 'auto' }}

      - name: Extract Binary from Wheel
        shell: bash
        run: |
          mkdir -p bin_output/${{ matrix.platform.folder }}
          python -c "
          import zipfile, os, glob
          wheel = glob.glob('core-rust/dist/*.whl')[0]
          with zipfile.ZipFile(wheel, 'r') as z:
              for f in z.namelist():
                  if f.endswith('.pyd') or f.endswith('.so'):
                      data = z.read(f)
                      out_name = '${{ env.APP_NAME }}.pyd' if f.endswith('.pyd') else '${{ env.APP_NAME }}.so'
                      with open(os.path.join('bin_output/${{ matrix.platform.folder }}', out_name), 'wb') as out_f:
                          out_f.write(data)
          "

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-core-${{ matrix.platform.folder }}
          path: bin_output/${{ matrix.platform.folder }}/
          if-no-files-found: error